apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - port: {{ .Values.apiGateway.port }}
    targetPort: {{ .Values.apiGateway.port }}
    nodePort: {{ .Values.apiGateway.nodePort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: {{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.apiGateway.port }}
        env:
        - name: AUTH_SERVICE_URL
          value: http://auth-service:{{ .Values.authService.port }}
        - name: POSTGRES_HOST
          value: postgres
        - name: POSTGRES_PORT
          value: "{{ .Values.postgres.port }}"
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        resources:
          requests:
            memory: {{ .Values.apiGateway.resources.requests.memory }}
            cpu: {{ .Values.apiGateway.resources.requests.cpu }}
          limits:
            memory: {{ .Values.apiGateway.resources.limits.memory }}
            cpu: {{ .Values.apiGateway.resources.limits.cpu }}
