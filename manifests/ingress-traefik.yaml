apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collegehub-ingress
  namespace: collegehub
spec:
  ingressClassName: traefik
  rules:
  - host: collegehub.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8000
