apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: collegehub
spec:
  selector:
    app: auth-service
  ports:
  - port: 8001
    targetPort: 8001
---
apiVersion: apps/v1  
kind: Deployment
metadata:
  name: auth-service
  namespace: collegehub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        - name: REDIS_HOST
          value: redis
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
           
